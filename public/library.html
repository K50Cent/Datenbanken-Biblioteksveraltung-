<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bibliotheksverwaltung</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="app-page">
    <nav class="navbar">
      <div class="navbar-brand">Bibliotheksverwaltung</div>
      <div class="navbar-user">
        <span id="navUserName"></span>
        <a href="/admin.html" class="btn btn-outline btn-sm" id="adminPanelBtn" hidden>Admin</a>
        <button class="btn btn-outline btn-sm" id="logoutBtn">Abmelden</button>
      </div>
    </nav>

    <div class="container">
      <div class="tabs">
        <button class="tab-btn active" data-tab="books">Bücher</button>
        <button class="tab-btn" data-tab="loans">
          Meine Ausleihen
          <span class="badge" id="loansBadge" hidden></span>
        </button>
      </div>

      <!-- Tab 1: Bücher -->
      <div id="tab-books" class="tab-content active">
        <div class="search-bar">
          <div class="form-group">
            <label for="searchInput">Suche (Titel / Autor)</label>
            <input type="text" id="searchInput" placeholder="z.B. Kafka, Faust …" />
          </div>
          <div class="form-group">
            <label for="categoryFilter">Kategorie</label>
            <select id="categoryFilter">
              <option value="">Alle Kategorien</option>
            </select>
          </div>
          <div class="form-group">
            <label for="authorFilter">Autor</label>
            <select id="authorFilter">
              <option value="">Alle Autoren</option>
            </select>
          </div>
          <button class="btn btn-primary" id="searchBtn">Suchen</button>
        </div>

        <div id="booksList" class="books-grid">
          <div class="empty-state"><p>Bücher werden geladen …</p></div>
        </div>
      </div>

      <!-- Tab 2: Meine Ausleihen -->
      <div id="tab-loans" class="tab-content">
        <div class="loan-toolbar">
          <label for="loanSort">Sortierung nach Abgabedatum</label>
          <select id="loanSort">
            <option value="asc">Aufsteigend</option>
            <option value="desc">Absteigend</option>
          </select>
        </div>
        <div id="loansContent">
          <p>Ausleihen werden geladen …</p>
        </div>
      </div>
    </div>

    <script src="/library.js" defer></script>
  </body>
</html>
