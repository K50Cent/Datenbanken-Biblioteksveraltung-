<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Bibliotheksverwaltung</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="app-page">
    <nav class="navbar">
      <div class="navbar-brand">Bibliotheksverwaltung - Admin</div>
      <div class="navbar-user">
        <span id="navUserName"></span>
        <a href="/library.html" class="btn btn-outline btn-sm">Zur Buecherei</a>
        <button class="btn btn-outline btn-sm" id="logoutBtn">Abmelden</button>
      </div>
    </nav>

    <main class="container">
      <section class="card">
        <h1>Buecher verwalten</h1>
        <p>Hier kann die Bibliothek Buecher anlegen, bearbeiten und loeschen.</p>

        <form id="bookFormEl">
          <input type="hidden" id="editBookId" />

          <div class="form-group">
            <label for="bookTitle">Titel *</label>
            <input type="text" id="bookTitle" required />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="bookIsbn">ISBN *</label>
              <input type="text" id="bookIsbn" required />
            </div>
            <div class="form-group">
              <label for="bookYear">Erscheinungsjahr *</label>
              <input type="number" id="bookYear" min="1000" max="2100" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="bookCategory">Kategorie</label>
              <select id="bookCategory">
                <option value="">Keine Kategorie</option>
              </select>
            </div>
            <div class="form-group">
              <label for="bookCopies">Anzahl Exemplare</label>
              <input type="number" id="bookCopies" value="1" min="1" />
            </div>
          </div>

          <div class="form-group">
            <label for="bookAuthors">Autoren</label>
            <select id="bookAuthors" multiple size="4"></select>
            <small>Mehrere Autoren mit Strg oder Cmd auswaehlen.</small>
          </div>

          <div id="bookFormMessage" class="message" hidden></div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="bookFormSubmitBtn">Buch speichern</button>
            <button type="button" class="btn btn-outline" id="clearBookBtn">Formular leeren</button>
          </div>
        </form>
      </section>

      <section>
        <h2>Vorhandene Buecher</h2>
        <div id="booksTableContainer"><p>Buecher werden geladen ...</p></div>
      </section>
    </main>

    <script src="/admin.js" defer></script>
  </body>
</html>
