<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bibliotheksverwaltung – Registrierung</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-card">
      <h1>Bibliotheksverwaltung</h1>
      <p class="subtitle">Erstelle einen neuen Benutzeraccount.</p>

      <form id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label for="vorname">Vorname</label>
            <input id="vorname" name="vorname" autocomplete="given-name" required />
          </div>
          <div class="form-group">
            <label for="name">Name</label>
            <input id="name" name="name" autocomplete="family-name" required />
          </div>
        </div>

        <div class="form-group">
          <label for="loginname">Loginname</label>
          <input id="loginname" name="loginname" autocomplete="username" required />
        </div>

        <div class="form-group">
          <label for="password">Passwort</label>
          <input id="password" name="password" type="password" autocomplete="new-password" required />
        </div>

        <button id="submitBtn" type="submit" class="btn btn-primary btn-full">Account erstellen</button>
      </form>

      <div id="message" class="message" hidden></div>

      <p class="auth-link">
        Bereits ein Konto? <a href="/index.html">Zum Login</a>
      </p>
    </main>

    <script src="/register.js" defer></script>
  </body>
</html>
