<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bibliotheksverwaltung – Anmelden</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-card">
      <h1>Bibliotheksverwaltung</h1>
      <p class="subtitle">Bitte melde dich mit deinem Loginnamen und Passwort an.</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="loginname">Loginname</label>
          <input id="loginname" name="loginname" autocomplete="username" required />
        </div>

        <div class="form-group">
          <label for="password">Passwort</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>

        <button id="submitBtn" type="submit" class="btn btn-primary btn-full">Anmelden</button>
      </form>

      <div id="message" class="message" hidden></div>

      <p class="auth-link">
        Noch kein Konto? <a href="/register.html">Jetzt registrieren</a>
      </p>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
